name: Pull Request

on:
  pull_request:
  workflow_dispatch:

jobs:
  quality:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: |
            **/*.csproj
            global.json

      - name: Restore
        run: dotnet restore Ashes.slnx

      - name: Build
        run: dotnet build Ashes.slnx --configuration Release --no-restore

      - name: Verify formatting
        run: dotnet format Ashes.slnx --verify-no-changes --no-restore

      - name: Run Ashes.Tests
        run: dotnet run --project src/Ashes.Tests/Ashes.Tests.csproj --configuration Release --no-build --no-restore -- --results-directory TestResults --maximum-parallel-tests 1 --report-trx

      - name: Run Ashes.Lsp.Tests
        run: dotnet run --project src/Ashes.Lsp.Tests/Ashes.Lsp.Tests.csproj --configuration Release --no-build --no-restore -- --results-directory TestResults --maximum-parallel-tests 1 --report-trx

      - name: Publish Ashes CLI binaries
        run: |
          dotnet publish src/Ashes.Cli/Ashes.Cli.csproj --configuration Release --runtime linux-x64 --self-contained true -p:PublishSingleFile=true -o artifacts/ashes/linux
          dotnet publish src/Ashes.Cli/Ashes.Cli.csproj --configuration Release --runtime win-x64 --self-contained true -p:PublishSingleFile=true -o artifacts/ashes/windows

      - name: Upload Ashes CLI binaries
        uses: actions/upload-artifact@v7
        with:
          name: ashes-cli-binaries
          path: artifacts/ashes
          overwrite: true
          retention-days: 365

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-dotnet-quality
          path: TestResults
          overwrite: true
          retention-days: 365

  test-matrix:
    needs: quality
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download Ashes CLI binaries
        uses: actions/download-artifact@v8
        with:
          name: ashes-cli-binaries
          path: artifacts/ashes

      - name: Run examples (Linux)
        if: runner.os == 'Linux'
        run: |
          chmod +x artifacts/ashes/linux/ashes
          ASHES_CLI=./artifacts/ashes/linux/ashes
          for example in examples/*.ash; do
            case "$(basename "$example")" in
              http_get.ash|tcp_close.ash|tcp_connect.ash|tcp_receive.ash|tcp_send.ash)
                continue
                ;;
            esac
            "$ASHES_CLI" run "$example"
          done

      - name: Run http example (Linux)
        if: runner.os == 'Linux'
        run: |
          set -euo pipefail
          chmod +x artifacts/ashes/linux/ashes
          ASHES_CLI=./artifacts/ashes/linux/ashes

          python3 - <<'PY' &
          import socket

          server = socket.socket()
          server.setsockopt(socket.SOL_SOCKET, socket.SO_REUSEADDR, 1)
          server.bind(("127.0.0.1", 8080))
          server.listen(1)
          server.settimeout(10)

          connection, _ = server.accept()
          connection.recv(4096)
          connection.sendall(b"HTTP/1.1 200 OK\r\nConnection: close\r\n\r\nhello from http")
          connection.close()
          server.close()
          PY

          server_pid=$!
          trap 'kill "$server_pid" 2>/dev/null || true' EXIT
          "$ASHES_CLI" run examples/http_get.ash
          wait "$server_pid"
          trap - EXIT

      - name: Run tcp examples (Linux)
        if: runner.os == 'Linux'
        run: |
          set -euo pipefail
          chmod +x artifacts/ashes/linux/ashes
          ASHES_CLI=./artifacts/ashes/linux/ashes

          python3 - <<'PY' &
          import socket
          import time

          server = socket.socket()
          server.setsockopt(socket.SOL_SOCKET, socket.SO_REUSEADDR, 1)
          server.bind(("127.0.0.1", 8080))
          server.listen(1)
          server.settimeout(10)

          connection, _ = server.accept()
          time.sleep(0.2)
          connection.close()
          server.close()
          PY

          server_pid=$!
          trap 'kill "$server_pid" 2>/dev/null || true' EXIT
          "$ASHES_CLI" run examples/tcp_connect.ash
          wait "$server_pid"

          python3 - <<'PY' &
          import socket

          server = socket.socket()
          server.setsockopt(socket.SOL_SOCKET, socket.SO_REUSEADDR, 1)
          server.bind(("127.0.0.1", 8080))
          server.listen(1)
          server.settimeout(10)

          connection, _ = server.accept()
          connection.recv(64)
          connection.close()
          server.close()
          PY

          server_pid=$!
          trap 'kill "$server_pid" 2>/dev/null || true' EXIT
          "$ASHES_CLI" run examples/tcp_send.ash
          wait "$server_pid"

          python3 - <<'PY' &
          import socket

          server = socket.socket()
          server.setsockopt(socket.SOL_SOCKET, socket.SO_REUSEADDR, 1)
          server.bind(("127.0.0.1", 8080))
          server.listen(1)
          server.settimeout(10)

          connection, _ = server.accept()
          connection.sendall(b"hello-from-server")
          connection.close()
          server.close()
          PY

          server_pid=$!
          trap 'kill "$server_pid" 2>/dev/null || true' EXIT
          "$ASHES_CLI" run examples/tcp_receive.ash
          wait "$server_pid"

          python3 - <<'PY' &
          import socket
          import time

          server = socket.socket()
          server.setsockopt(socket.SOL_SOCKET, socket.SO_REUSEADDR, 1)
          server.bind(("127.0.0.1", 8080))
          server.listen(1)
          server.settimeout(10)

          connection, _ = server.accept()
          time.sleep(0.2)
          connection.close()
          server.close()
          PY

          server_pid=$!
          trap 'kill "$server_pid" 2>/dev/null || true' EXIT
          "$ASHES_CLI" run examples/tcp_close.ash
          wait "$server_pid"
          trap - EXIT

      - name: Run examples (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $ashesCli = ".\artifacts\ashes\windows\ashes.exe"
          Get-ChildItem examples\*.ash |
            Where-Object { $_.Name -notin @('http_get.ash', 'tcp_close.ash', 'tcp_connect.ash', 'tcp_receive.ash', 'tcp_send.ash') } |
            ForEach-Object {
            & $ashesCli run $_.FullName
            if ($LASTEXITCODE -ne 0) {
              throw "Example failed: $($_.FullName) (exit code: $LASTEXITCODE)"
            }
          }

      - name: Run http example (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $ashesCli = ".\artifacts\ashes\windows\ashes.exe"

          $job = Start-Job -ScriptBlock {
            $listener = [System.Net.Sockets.TcpListener]::new([System.Net.IPAddress]::Loopback, 8080)
            $listener.Start()
            try {
              $acceptTask = $listener.AcceptTcpClientAsync()
              if (-not $acceptTask.Wait([TimeSpan]::FromSeconds(10))) {
                throw "Timed out waiting for HTTP example connection"
              }

              $client = $acceptTask.Result
              try {
                $stream = $client.GetStream()
                try {
                  $buffer = New-Object byte[] 4096
                  [void]$stream.Read($buffer, 0, $buffer.Length)
                  $response = [System.Text.Encoding]::UTF8.GetBytes("HTTP/1.1 200 OK`r`nConnection: close`r`n`r`nhello from http")
                  $stream.Write($response, 0, $response.Length)
                  $stream.Flush()
                }
                finally {
                  $stream.Dispose()
                }
              }
              finally {
                $client.Dispose()
              }
            }
            finally {
              $listener.Stop()
            }
          }

          try {
            & $ashesCli run examples/http_get.ash
            if ($LASTEXITCODE -ne 0) {
              throw "HTTP example failed: examples/http_get.ash (exit code: $LASTEXITCODE)"
            }

            Wait-Job $job | Out-Null
            Receive-Job $job -AutoRemoveJob | Out-Null
          }
          finally {
            if ($job.State -eq 'Running') {
              Stop-Job $job | Out-Null
            }

            Remove-Job $job -Force -ErrorAction SilentlyContinue
          }

      - name: Run tcp examples (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $ashesCli = ".\artifacts\ashes\windows\ashes.exe"

          function Invoke-ExampleWithServer([string]$examplePath, [scriptblock]$serverScript, [string]$failureLabel) {
            $job = Start-Job -ScriptBlock $serverScript
            try {
              & $ashesCli run $examplePath
              if ($LASTEXITCODE -ne 0) {
                throw "$failureLabel failed: $examplePath (exit code: $LASTEXITCODE)"
              }

              Wait-Job $job | Out-Null
              Receive-Job $job -AutoRemoveJob | Out-Null
            }
            finally {
              if ($job.State -eq 'Running') {
                Stop-Job $job | Out-Null
              }

              Remove-Job $job -Force -ErrorAction SilentlyContinue
            }
          }

          Invoke-ExampleWithServer "examples/tcp_connect.ash" {
            $listener = [System.Net.Sockets.TcpListener]::new([System.Net.IPAddress]::Loopback, 8080)
            $listener.Start()
            try {
              $acceptTask = $listener.AcceptTcpClientAsync()
              if (-not $acceptTask.Wait([TimeSpan]::FromSeconds(10))) {
                throw "Timed out waiting for tcp_connect example connection"
              }

              $client = $acceptTask.Result
              try {
                Start-Sleep -Milliseconds 200
              }
              finally {
                $client.Dispose()
              }
            }
            finally {
              $listener.Stop()
            }
          } "TCP connect example"

          Invoke-ExampleWithServer "examples/tcp_send.ash" {
            $listener = [System.Net.Sockets.TcpListener]::new([System.Net.IPAddress]::Loopback, 8080)
            $listener.Start()
            try {
              $acceptTask = $listener.AcceptTcpClientAsync()
              if (-not $acceptTask.Wait([TimeSpan]::FromSeconds(10))) {
                throw "Timed out waiting for tcp_send example connection"
              }

              $client = $acceptTask.Result
              try {
                $stream = $client.GetStream()
                try {
                  $buffer = New-Object byte[] 64
                  [void]$stream.Read($buffer, 0, $buffer.Length)
                }
                finally {
                  $stream.Dispose()
                }
              }
              finally {
                $client.Dispose()
              }
            }
            finally {
              $listener.Stop()
            }
          } "TCP send example"

          Invoke-ExampleWithServer "examples/tcp_receive.ash" {
            $listener = [System.Net.Sockets.TcpListener]::new([System.Net.IPAddress]::Loopback, 8080)
            $listener.Start()
            try {
              $acceptTask = $listener.AcceptTcpClientAsync()
              if (-not $acceptTask.Wait([TimeSpan]::FromSeconds(10))) {
                throw "Timed out waiting for tcp_receive example connection"
              }

              $client = $acceptTask.Result
              try {
                $stream = $client.GetStream()
                try {
                  $payload = [System.Text.Encoding]::UTF8.GetBytes("hello-from-server")
                  $stream.Write($payload, 0, $payload.Length)
                  $stream.Flush()
                }
                finally {
                  $stream.Dispose()
                }
              }
              finally {
                $client.Dispose()
              }
            }
            finally {
              $listener.Stop()
            }
          } "TCP receive example"

          Invoke-ExampleWithServer "examples/tcp_close.ash" {
            $listener = [System.Net.Sockets.TcpListener]::new([System.Net.IPAddress]::Loopback, 8080)
            $listener.Start()
            try {
              $acceptTask = $listener.AcceptTcpClientAsync()
              if (-not $acceptTask.Wait([TimeSpan]::FromSeconds(10))) {
                throw "Timed out waiting for tcp_close example connection"
              }

              $client = $acceptTask.Result
              try {
                Start-Sleep -Milliseconds 200
              }
              finally {
                $client.Dispose()
              }
            }
            finally {
              $listener.Stop()
            }
          } "TCP close example"

      - name: Run tests (Linux)
        if: runner.os == 'Linux'
        timeout-minutes: 2
        run: ./artifacts/ashes/linux/ashes test tests

      - name: Run tests (Windows)
        if: runner.os == 'Windows'
        timeout-minutes: 2
        run: .\artifacts\ashes\windows\ashes.exe test tests

      - name: Verify fmt on test and example files (Linux)
        if: runner.os == 'Linux'
        run: |
          set -e
          ASHES_CLI=./artifacts/ashes/linux/ashes
          "$ASHES_CLI" fmt examples -w > /dev/null
          "$ASHES_CLI" fmt tests/imports -w > /dev/null
          for test in tests/*.ash; do
            if grep -Eq '^//[[:space:]]*fmt-skip:' "$test"; then
              continue
            fi
            "$ASHES_CLI" fmt "$test" -w > /dev/null
          done
          git diff --exit-code -- examples tests

      - name: Verify fmt on test and example files (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $ashesCli = ".\artifacts\ashes\windows\ashes.exe"
          & $ashesCli fmt examples -w > $null
          & $ashesCli fmt tests\imports -w > $null
          Get-ChildItem tests\*.ash | ForEach-Object {
            if (Select-String -Path $_.FullName -Pattern '^//\s*fmt-skip:' -Quiet) {
              return
            }
            & $ashesCli fmt $_.FullName -w > $null
          }
          git diff --exit-code -- examples tests