name: Pull Request

on:
  pull_request:
  workflow_dispatch:

jobs:
  quality:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Find latest LLVM native libraries artifact
        id: find-llvm-runtimes
        uses: actions/github-script@v8
        with:
          script: |
            const artifactName = 'llvm-runtimes';
            const { owner, repo } = context.repo;

            for (let page = 1; page <= 10; page += 1) {
              const response = await github.rest.actions.listArtifactsForRepo({
                owner,
                repo,
                name: artifactName,
                per_page: 100,
                page,
              });

              const artifact = response.data.artifacts.find(candidate =>
                !candidate.expired &&
                candidate.workflow_run?.id !== context.runId
              );

              if (artifact) {
                core.setOutput('run-id', String(artifact.workflow_run.id));
                return;
              }

              if (response.data.artifacts.length < 100) {
                break;
              }
            }

            core.setOutput('run-id', '');

      - name: Download LLVM native libraries artifact
        if: steps.find-llvm-runtimes.outputs.run-id != ''
        continue-on-error: true
        uses: actions/download-artifact@v8
        with:
          name: llvm-runtimes
          path: runtimes
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ steps.find-llvm-runtimes.outputs.run-id }}

      - name: Check LLVM native libraries
        id: llvm-runtimes
        shell: bash
        run: |
          if [ -d runtimes ] && [ -n "$(ls -A runtimes 2>/dev/null)" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Download all LLVM native libraries
        if: steps.llvm-runtimes.outputs.present != 'true'
        run: bash scripts/download-llvm-native.sh --all

      - name: Upload LLVM native libraries artifact
        uses: actions/upload-artifact@v7
        with:
          name: llvm-runtimes
          path: runtimes
          overwrite: true
          retention-days: 7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: |
            **/*.csproj
            global.json

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'
          check-latest: true

      - name: Restore
        run: dotnet restore Ashes.slnx

      - name: Build
        run: dotnet build Ashes.slnx --configuration Release --no-restore

      - name: Verify formatting
        run: dotnet format Ashes.slnx --verify-no-changes --no-restore

      - name: Run Ashes.Tests
        run: dotnet run --project src/Ashes.Tests/Ashes.Tests.csproj --configuration Release --no-build --no-restore -- --results-directory TestResults --report-trx

      - name: Run Ashes.Lsp.Tests
        run: dotnet run --project src/Ashes.Lsp.Tests/Ashes.Lsp.Tests.csproj --configuration Release --no-build --no-restore -- --results-directory TestResults --report-trx

      - name: Verify VS Code extension
        run: |
          cd vscode-extension
          corepack enable
          pnpm install --frozen-lockfile --force
          pnpm run lint
          pnpm run format:check
          pnpm run compile

      - name: Publish Ashes CLI binaries
        run: |
          dotnet publish src/Ashes.Cli/Ashes.Cli.csproj --configuration Release --runtime linux-x64 --self-contained true -p:PublishSingleFile=true -o artifacts/ashes/linux-x64
          dotnet publish src/Ashes.Cli/Ashes.Cli.csproj --configuration Release --runtime linux-arm64 --self-contained true -p:PublishSingleFile=true -o artifacts/ashes/linux-arm64
          dotnet publish src/Ashes.Cli/Ashes.Cli.csproj --configuration Release --runtime win-x64 --self-contained true -p:PublishSingleFile=true -o artifacts/ashes/win-x64

      - name: Upload Ashes CLI binaries
        uses: actions/upload-artifact@v7
        with:
          name: ashes-cli-binaries
          path: artifacts/ashes
          overwrite: true
          retention-days: 7

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results-dotnet-quality
          path: TestResults
          overwrite: true
          retention-days: 7

  test-matrix:
    needs: [quality]
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            cli-path: artifacts/ashes/linux-x64/ashes
          - os: ubuntu-24.04-arm
            cli-path: artifacts/ashes/linux-arm64/ashes
          - os: windows-latest
            cli-path: artifacts\ashes\win-x64\ashes.exe
      fail-fast: false

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Download Ashes CLI binaries
        uses: actions/download-artifact@v8
        with:
          name: ashes-cli-binaries
          path: artifacts/ashes

      - name: Run examples (Linux)
        if: runner.os == 'Linux'
        run: |
          chmod +x "${{ matrix.cli-path }}"
          ASHES_CLI="./${{ matrix.cli-path }}"
          for example in examples/*.ash; do
            case "$(basename "$example")" in
              http_get.ash|tcp_close.ash|tcp_connect.ash|tcp_receive.ash|tcp_send.ash)
                continue
                ;;
            esac
            "$ASHES_CLI" run "$example"
          done

      - name: Run examples (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $ashesCli = ".\${{ matrix.cli-path }}"
          Get-ChildItem examples\*.ash |
            Where-Object { $_.Name -notin @('http_get.ash', 'tcp_close.ash', 'tcp_connect.ash', 'tcp_receive.ash', 'tcp_send.ash') } |
            ForEach-Object {
            & $ashesCli run $_.FullName
            if ($LASTEXITCODE -ne 0) {
              throw "Example failed: $($_.FullName) (exit code: $LASTEXITCODE)"
            }
          }

      - name: Run tests (Linux)
        if: runner.os == 'Linux'
        timeout-minutes: 2
        run: |
          "./${{ matrix.cli-path }}" test tests

      - name: Run tests (Windows)
        if: runner.os == 'Windows'
        timeout-minutes: 2
        shell: pwsh
        run: |
          & ".\${{ matrix.cli-path }}" test tests

      - name: Verify fmt on test and example files (Linux)
        if: runner.os == 'Linux'
        run: |
          set -e
          ASHES_CLI="./${{ matrix.cli-path }}"
          "$ASHES_CLI" fmt examples -w > /dev/null
          "$ASHES_CLI" fmt tests/imports -w > /dev/null
          for test in tests/*.ash; do
            if grep -Eq '^//[[:space:]]*fmt-skip:' "$test"; then
              continue
            fi
            "$ASHES_CLI" fmt "$test" -w > /dev/null
          done
          git diff --exit-code -- examples tests

      - name: Verify fmt on test and example files (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $ashesCli = ".\${{ matrix.cli-path }}"
          & $ashesCli fmt examples -w > $null
          & $ashesCli fmt tests\imports -w > $null
          Get-ChildItem tests\*.ash | ForEach-Object {
            if (Select-String -Path $_.FullName -Pattern '^//\s*fmt-skip:' -Quiet) {
              return
            }
            & $ashesCli fmt $_.FullName -w > $null
          }
          git diff --exit-code -- examples tests
