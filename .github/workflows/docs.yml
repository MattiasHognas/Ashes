# Build and deploy the documentation site (docs/builder -> docs/site) to
# GitHub Pages. The only GitHub-hosted workflow: everything else runs in the
# local containerized CI (docs/md/guide/local-ci.md), but Pages deployment has
# to happen here. Requires Settings -> Pages -> Source: "GitHub Actions" once.
name: docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "vscode-extension/syntaxes/ashes.tmLanguage.json"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One deployment at a time; let an in-flight run finish so a half-published
# site is never left behind.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json

      - name: Generate Internals API Reference
        run: dotnet run --project tools/docs-api-gen -- .

      - uses: actions/setup-node@v6
        with:
          node-version: 26

      - name: Enable corepack (pinned pnpm)
        run: corepack enable

      - name: Install dependencies
        working-directory: docs/builder
        env:
          COREPACK_ENABLE_AUTO_PIN: "0"
        run: pnpm install --frozen-lockfile

      - name: Build site
        working-directory: docs/builder
        env:
          COREPACK_ENABLE_AUTO_PIN: "0"
          # Project Pages are served under /<repo>/. Drop this once a custom
          # domain is attached in the Pages settings.
          DOCS_BASE: /Ashes/
        run: pnpm docs:build

      - uses: actions/configure-pages@v6

      - uses: actions/upload-pages-artifact@v5
        with:
          path: docs/site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
