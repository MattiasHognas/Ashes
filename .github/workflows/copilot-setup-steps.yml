name: "Copilot Setup Steps"

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Install Wine
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends wine
          wine --version

      - name: Cache LLVM runtimes
        id: cache-llvm
        uses: actions/cache@v5
        with:
          path: |
            runtimes/linux-x64/libLLVM.so
            runtimes/linux-arm64/libLLVM.so
            runtimes/win-x64/libLLVM.dll
          key: runtimes-llvm-${{ hashFiles('scripts/download-llvm-native.sh') }}
          enableCrossOsArchive: true

      - name: Download all LLVM native libraries
        if: steps.cache-llvm.outputs.cache-hit != 'true'
        run: bash scripts/download-llvm-native.sh --all

      - name: Save LLVM cache
        if: steps.cache-llvm.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: |
            runtimes/linux-x64/libLLVM.so
            runtimes/linux-arm64/libLLVM.so
            runtimes/win-x64/libLLVM.dll
          key: runtimes-llvm-${{ hashFiles('scripts/download-llvm-native.sh') }}
          enableCrossOsArchive: true

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: |
            **/*.csproj
            global.json

      - name: Install linux-arm64 execution prerequisites (QEMU)
        run: |
          sudo apt-get install -y --no-install-recommends qemu-user libc6-arm64-cross libgcc-s1-arm64-cross libstdc++6-arm64-cross
          qemu-aarch64 --version
          test -f /usr/aarch64-linux-gnu/lib/ld-linux-aarch64.so.1
          test -f /usr/aarch64-linux-gnu/lib/libgcc_s.so.1
          test -f /usr/aarch64-linux-gnu/lib/libstdc++.so.6

      - name: Restore .NET dependencies
        run: dotnet restore Ashes.slnx
