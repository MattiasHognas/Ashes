name: Release

on:
  push:
    tags:
      - 'v[0-9]*.*.*'

jobs:
  prepare-llvm:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Restore Runtimes Cache
        id: cache-runtimes
        uses: actions/cache/restore@v5
        with:
          path: runtimes
          key: runtimes-22
          enableCrossOsArchive: true

      - name: Download all LLVM native libraries
        if: steps.cache-runtimes.outputs.cache-hit != 'true'
        run: bash scripts/download-llvm-native.sh --all

      - name: Save Runtimes Cache
        if: steps.cache-runtimes.outputs.cache-hit != 'true'
        uses: actions/cache/save@v5
        with:
          path: runtimes
          key: runtimes-22
          enableCrossOsArchive: true

  build-compiler:
    needs: prepare-llvm
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            rid: linux-x64
            artifact: ashes-linux-x64
            binary: ashes
          - os: ubuntu-24.04-arm
            rid: linux-arm64
            artifact: ashes-linux-arm64
            binary: ashes
          - os: windows-latest
            rid: win-x64
            artifact: ashes-win-x64
            binary: ashes.exe

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Restore Runtimes Cache
        uses: actions/cache/restore@v5
        with:
          path: runtimes
          key: runtimes-22
          enableCrossOsArchive: true

      - name: Get version
        id: version
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: |
            **/*.csproj
            global.json

      - name: Restore
        run: dotnet restore src/Ashes.Cli/Ashes.Cli.csproj --runtime ${{ matrix.rid }}

      - name: Publish
        run: dotnet publish src/Ashes.Cli/Ashes.Cli.csproj --configuration Release --runtime ${{ matrix.rid }} --self-contained true -p:PublishSingleFile=true -p:Version=${{ steps.version.outputs.version }} --output publish/${{ matrix.rid }} --no-restore

      - name: Stage and zip artifact (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p staging
          cp publish/${{ matrix.rid }}/${{ matrix.binary }} staging/
          cp publish/${{ matrix.rid }}/libLLVM.so staging/
          [ -f LICENSE ] && cp LICENSE staging/ || true
          cp README.md staging/
          (cd staging && zip ../${{ matrix.artifact }}.zip *)

      - name: Stage and zip artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path staging | Out-Null
          Copy-Item publish/${{ matrix.rid }}/${{ matrix.binary }} staging/
          Copy-Item publish/${{ matrix.rid }}/libLLVM.dll staging/
          if (Test-Path LICENSE) { Copy-Item LICENSE staging/ }
          Copy-Item README.md staging/
          Compress-Archive -Path staging\* -DestinationPath ${{ matrix.artifact }}.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.zip

  build-lsp-dap:
    needs: prepare-llvm
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      matrix:
        include:
          - project: src/Ashes.Lsp/Ashes.Lsp.csproj
            rid: linux-x64
            binary: ashes-lsp
            artifact: ashes-lsp-linux-x64
          - project: src/Ashes.Lsp/Ashes.Lsp.csproj
            rid: linux-arm64
            binary: ashes-lsp
            artifact: ashes-lsp-linux-arm64
          - project: src/Ashes.Lsp/Ashes.Lsp.csproj
            rid: win-x64
            binary: ashes-lsp.exe
            artifact: ashes-lsp-win-x64
          - project: src/Ashes.Dap/Ashes.Dap.csproj
            rid: linux-x64
            binary: ashes-dap
            artifact: ashes-dap-linux-x64
          - project: src/Ashes.Dap/Ashes.Dap.csproj
            rid: linux-arm64
            binary: ashes-dap
            artifact: ashes-dap-linux-arm64
          - project: src/Ashes.Dap/Ashes.Dap.csproj
            rid: win-x64
            binary: ashes-dap.exe
            artifact: ashes-dap-win-x64

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Restore Runtimes Cache
        uses: actions/cache/restore@v5
        with:
          path: runtimes
          key: runtimes-22
          enableCrossOsArchive: true

      - name: Get version
        id: version
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: |
            **/*.csproj
            global.json

      - name: Restore
        run: dotnet restore ${{ matrix.project }} --runtime ${{ matrix.rid }}

      - name: Publish
        run: dotnet publish ${{ matrix.project }} --configuration Release --runtime ${{ matrix.rid }} --self-contained true -p:PublishSingleFile=true -p:Version=${{ steps.version.outputs.version }} --output publish/${{ matrix.rid }} --no-restore

      - name: Stage and zip artifact
        run: |
          mkdir -p staging
          cp publish/${{ matrix.rid }}/${{ matrix.binary }} staging/
          [ -f LICENSE ] && cp LICENSE staging/ || true
          cp README.md staging/
          (cd staging && zip ../${{ matrix.artifact }}.zip *)

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}.zip

  build-vscode-extension:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'
          check-latest: true

      - name: Get and validate version
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [[ -z "$VERSION" || ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid version: '$VERSION'" >&2
            exit 1
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Build and package VS Code extension
        run: |
          cd vscode-extension
          corepack enable
          pnpm install --frozen-lockfile --force
          pnpm version --no-git-tag-version ${{ steps.version.outputs.version }}
          pnpm run compile
          pnpm dlx --config.ignoredBuiltDependencies[]=@vscode/vsce-sign --config.ignoredBuiltDependencies[]=keytar @vscode/vsce@3.7.1 package --no-dependencies --allow-missing-repository --skip-license --out ../ashes-language-${{ steps.version.outputs.version }}.vsix

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ashes-vscode
          path: ashes-language-${{ steps.version.outputs.version }}.vsix

  release:
    needs: [build-compiler, build-lsp-dap, build-vscode-extension]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts

      - name: Get and validate version
        id: version
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [[ -z "$VERSION" || ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Invalid version: '$VERSION'" >&2
            exit 1
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          name: Ashes ${{ github.ref_name }}
          generate_release_notes: false
          files: |
            artifacts/ashes-win-x64/ashes-win-x64.zip
            artifacts/ashes-linux-x64/ashes-linux-x64.zip
            artifacts/ashes-linux-arm64/ashes-linux-arm64.zip
            artifacts/ashes-lsp-win-x64/ashes-lsp-win-x64.zip
            artifacts/ashes-lsp-linux-x64/ashes-lsp-linux-x64.zip
            artifacts/ashes-lsp-linux-arm64/ashes-lsp-linux-arm64.zip
            artifacts/ashes-dap-win-x64/ashes-dap-win-x64.zip
            artifacts/ashes-dap-linux-x64/ashes-dap-linux-x64.zip
            artifacts/ashes-dap-linux-arm64/ashes-dap-linux-arm64.zip
            artifacts/ashes-vscode/ashes-language-${{ steps.version.outputs.version }}.vsix
