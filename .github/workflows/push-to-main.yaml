name: Push to main

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  # analyze:
  #   name: Analyze (${{ matrix.language }})
  #   runs-on: ubuntu-latest
  #   strategy:
  #     fail-fast: false
  #     matrix:
  #       language: [ 'csharp', 'javascript-typescript' ]

  #   steps:
  #     - name: Checkout repository
  #       uses: actions/checkout@v6

  #     - name: Initialize CodeQL
  #       uses: github/codeql-action/init@v4
  #       with:
  #         languages: ${{ matrix.language }}

  #     - name: Autobuild
  #       uses: github/codeql-action/autobuild@v4

  #     - name: Perform CodeQL analysis
  #       uses: github/codeql-action/analyze@v4
  
  packaging:
    # needs: analyze
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Find latest LLVM native libraries artifact
        id: find-llvm-runtimes
        uses: actions/github-script@v8
        with:
          script: |
            const artifactName = 'llvm-runtimes';
            // 10 pages × 100 artifacts per page gives up to 1000 recent artifacts.
            const maxPages = 10;
            const currentRunId = context.runId;
            const { owner, repo } = context.repo;

            for (let page = 1; page <= maxPages; page += 1) {
              const response = await github.rest.actions.listArtifactsForRepo({
                owner,
                repo,
                name: artifactName,
                per_page: 100,
                page,
              });

              const artifact = response.data.artifacts.find(candidate =>
                !candidate.expired &&
                candidate.workflow_run?.id > 0 &&
                candidate.workflow_run.id !== currentRunId
              );

              if (artifact) {
                core.setOutput('run-id', String(artifact.workflow_run.id));
                return;
              }

              if (response.data.artifacts.length < 100) {
                break;
              }
            }

            core.setOutput('run-id', '');

      - name: Download LLVM native libraries artifact
        if: steps.find-llvm-runtimes.outputs.run-id != ''
        continue-on-error: true
        uses: actions/download-artifact@v8
        with:
          name: llvm-runtimes
          path: runtimes
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ steps.find-llvm-runtimes.outputs.run-id }}

      - name: Check LLVM native libraries
        id: llvm-runtimes
        shell: bash
        run: |
          if [ -d runtimes ] && [ -n "$(ls -A runtimes 2>/dev/null)" ]; then
            echo "present=true" >> "$GITHUB_OUTPUT"
          else
            echo "present=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Download all LLVM native libraries
        if: steps.llvm-runtimes.outputs.present != 'true'
        run: bash scripts/download-llvm-native.sh --all

      - name: Upload LLVM native libraries artifact
        uses: actions/upload-artifact@v7
        with:
          name: llvm-runtimes
          path: runtimes
          overwrite: true
          retention-days: 7

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json
          cache: true
          cache-dependency-path: |
            **/*.csproj
            global.json

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'
          check-latest: true

      - name: Restore
        run: dotnet restore Ashes.slnx

      - name: Build
        run: dotnet build Ashes.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet run --project src/Ashes.Tests/Ashes.Tests.csproj --configuration Release --no-build --no-restore -- --results-directory TestResults --coverage --coverage-output coverage.cobertura.xml --coverage-output-format cobertura 

      - name: Bundle VS Code extension (Release)
        run: |
          cd vscode-extension
          corepack enable
          pnpm install --frozen-lockfile --force
          pnpm run lint
          pnpm run format:check
          pnpm run compile
          pnpm run build-lsp-server
          pnpm run build-dap-server
          pnpm dlx --config.ignoredBuiltDependencies[]=@vscode/vsce-sign --config.ignoredBuiltDependencies[]=keytar @vscode/vsce@3.7.1 package --no-dependencies --allow-missing-repository --skip-license --out ../ashes-vscode.vsix

      - name: Upload VS Code extension bundle
        uses: actions/upload-artifact@v7
        with:
          name: ashes-vscode
          path: ashes-vscode.vsix

      - name: Coverage summary
        uses: irongut/CodeCoverageSummary@v1.3.0
        with:
          filename: TestResults/coverage.cobertura.xml
          format: markdown
          output: both

      - name: Add coverage to quality-and-packaging summary
        run: |
          if [ -f code-coverage-results.md ]; then
            cat code-coverage-results.md >> "$GITHUB_STEP_SUMMARY"
          fi
